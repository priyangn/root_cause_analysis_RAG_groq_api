# Free-tier deploy on Render (no DigitalOcean payment).
# MongoDB: use MongoDB Atlas M0 free cluster — set MONGO_URL in dashboard.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: causesense-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: causesense
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: causesense-web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm ci --legacy-peer-deps && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false
