# Free-tier deploy on Render (no DigitalOcean payment).
# MongoDB: use MongoDB Atlas M0 free cluster — set MONGO_URL in dashboard.
# Docs: https://render.com/docs/blueprint-spec
# Note: static sites have no plan field (always free). Web Docker services use plan: free.

services:
  - type: web
    name: causesense-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: causesense
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_URL
        value: https://causesense-web.onrender.com
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false

  - type: web
    name: causesense-web
    runtime: static
    rootDir: frontend
    # Install devDependencies (craco/tailwind) — Render sets NODE_ENV=production by default
    buildCommand: NPM_CONFIG_PRODUCTION=false npm ci --legacy-peer-deps && npm run build
    staticPublishPath: ./build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=460"
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: NPM_CONFIG_LEGACY_PEER_DEPS
        value: "true"
      - key: REACT_APP_BACKEND_URL
        sync: false
