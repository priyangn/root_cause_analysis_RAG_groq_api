services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    # Do not publish MongoDB publicly in production
    expose:
      - "27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_URL: mongodb://mongodb:27017
      DB_NAME: causesense
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_API_KEY_2: ${GROQ_API_KEY_2:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      EMERGENT_LLM_KEY: ${EMERGENT_LLM_KEY:-}
    volumes:
      - backend_uploads:/app/uploads
    ports:
      - "8001:8001"

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mongodb_data:
  backend_uploads:
